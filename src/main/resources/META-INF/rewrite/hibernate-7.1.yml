---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.hibernate.MigrateToHibernate71
displayName: Migrate to Hibernate 7.1.x
description: >-
  This recipe will apply changes commonly needed when migrating to Hibernate 7.1.x.

preconditions:
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.hibernate.MigrateToHibernate70
  - org.openrewrite.hibernate.MigrateToHypersistenceUtilsHibernate71
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.hibernate.orm
      artifactId: '*'
      newVersion: 7.1.x

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.hibernate.MigrateToHypersistenceUtilsHibernate71
displayName: Migrate Hibernate Types to Hypersistence Utils for Hibernate 7.1
description: >-
  This recipe will migrate any existing dependencies on `io.hypersistence:hypersistence-utils-hibernate-70` to `io.hypersistence:hypersistence-utils-hibernate-71`.

preconditions:
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: io.hypersistence
      oldArtifactId: hypersistence-utils-hibernate-70
      newGroupId: io.hypersistence
      newArtifactId: hypersistence-utils-hibernate-71
      newVersion: 3.15.x
